<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>وضعیت LED</title>
  <style>
    body {
      font-family: Tahoma;
      text-align: center;
      padding: 40px;
      background: #1a1a2e;
      color: white;
    }
    h1 { margin-bottom: 40px; }
    .leds {
      display: flex;
      justify-content: center;
      gap: 60px;
    }
    .led {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      opacity: 0.15;
      transition: all 0.3s;
    }
    .led.on {
      opacity: 1;
      box-shadow: 0 0 40px currentColor;
    }
    #green  { background: #00ff00; color: #00ff00; }
    #yellow { background: #ffff00; color: #ffff00; }
    #red    { background: #ff0000; color: #ff0000; }
    .label  { margin-top: 14px; font-size: 16px; }
    #status {
      margin-top: 40px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>🔦 کنترل LED با صدا</h1>
  <div class="leds">
    <div>
      <div class="led" id="green"></div>
      <div class="label">سبز</div>
    </div>
    <div>
      <div class="led" id="yellow"></div>
      <div class="label">زرد</div>
    </div>
    <div>
      <div class="led" id="red"></div>
      <div class="label">قرمز</div>
    </div>
  </div>
  <div id="status">در حال اتصال...</div>

  <script>
    const IP = "10.198.24.243";

    setInterval(async () => {
      try {
        const res = await fetch(`http://${IP}/status`);
        const data = await res.json();
        document.getElementById("green").classList.toggle("on", data.green);
        document.getElementById("yellow").classList.toggle("on", data.yellow);
        document.getElementById("red").classList.toggle("on", data.red);
        document.getElementById("status").textContent = "آخرین بروزرسانی: " + new Date().toLocaleTimeString("fa-IR");
      } catch(e) {
        document.getElementById("status").textContent = "خطا در اتصال به NodeMCU";
      }
    }, 1000);
  </script>
</body>
</html>
